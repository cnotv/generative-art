server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-rendered per-route HTML when it exists, fall back to SPA shell
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }

    # WASM requires explicit MIME type
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
    }

    # Cache static assets aggressively; HTML never cached so meta tags are fresh
    location ~* \.(js|css|png|jpg|jpeg|webp|svg|ico|glb|gltf|mp3|fbx)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store";
    }
}

name: Tests Workflow

on:
  pull_request:
    branches: [ "main", "master" ]
  workflow_call:

jobs:
  check-rebase:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if branch is rebased on main
      run: |
        git fetch origin main
        BEHIND=$(git rev-list --count HEAD..origin/main)
        if [ "$BEHIND" -gt "0" ]; then
          echo "::error::Branch is $BEHIND commits behind main. Please rebase: git fetch origin main && git rebase origin/main"
          exit 1
        fi
        echo "Branch is up to date with main"

  lint:
    runs-on: ubuntu-latest
    needs: check-rebase
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run Linter
      run: pnpm run lint

    - name: Run Stylelint
      run: pnpm run lint:css

  format:
    runs-on: ubuntu-latest
    needs: check-rebase
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Check formatting
      run: pnpm run format:check

  test:
    runs-on: ubuntu-latest
    needs: check-rebase
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Run Unit Tests
      run: pnpm run test:unit

  # Visual tests disabled for manual debugging
  # visual-tests:
  #   runs-on: ubuntu-latest
  #   needs: check-rebase
  #   timeout-minutes: 15
  #   continue-on-error: true  # Don't block PRs if visual tests fail/timeout

  #   steps:
  #   - uses: actions/checkout@v4

  #   - uses: pnpm/action-setup@v4
  #     with:
  #       version: 9

  #   - name: Set up Node.js
  #     uses: actions/setup-node@v4
  #     with:
  #       node-version: '24'
  #       cache: 'pnpm'

  #   - name: Install dependencies
  #     run: pnpm install

  #   - name: Install Playwright browsers
  #     run: pnpm exec playwright install chromium

  #   - name: Run Visual Regression Tests
  #     run: pnpm run test:browser
  #     env:
  #       CI: true

  build:
    runs-on: ubuntu-latest
    needs: check-rebase
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Build Project
      run: pnpm run build

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
        retention-days: 1

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Run Lighthouse
      run: pnpm lighthouse

    - name: Print Lighthouse scores
      if: always()
      run: |
        REPORT=$(ls .lighthouseci/lhr-*.json 2>/dev/null | head -1)
        if [ -z "$REPORT" ]; then echo "No Lighthouse report found"; exit 0; fi
        node -e "
          const r = JSON.parse(require('fs').readFileSync('$REPORT', 'utf8'));
          const c = r.categories;
          const score = (k) => Math.round((c[k]?.score ?? 0) * 100);
          console.log('Lighthouse scores');
          console.log('  Performance:    ' + score('performance'));
          console.log('  Accessibility:  ' + score('accessibility'));
          console.log('  Best Practices: ' + score('best-practices'));
          console.log('  SEO:            ' + score('seo'));
        "

    - name: Upload Lighthouse results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lighthouse-results
        path: .lighthouseci/
        retention-days: 7

  size:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist/

    - name: Check bundle size
      run: pnpm run size

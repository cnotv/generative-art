name: Lighthouse

on:
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lighthouse-pr:
    name: Lighthouse (localhost)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run Lighthouse
        run: pnpm lighthouse

      - name: Generate badge SVG files
        if: success()
        run: |
          REPORT=$(ls .lighthouseci/lhr-*.json | head -1)
          node scripts/generate-lighthouse-badges.mjs "$REPORT"

      - name: Commit badge files to branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --cached --quiet || git commit -m "chore: update Lighthouse performance badges [skip ci]"
          git push

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-pr-results
          path: .lighthouseci/
          retention-days: 7

  lighthouse-production:
    name: Lighthouse (GitHub Pages)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install

      - name: Run Lighthouse
        run: pnpm lighthouse:prod

      - name: Generate badge JSON files
        run: |
          REPORT=$(ls .lighthouseci/lhr-*.json | head -1)
          node scripts/generate-lighthouse-badges.mjs "$REPORT"

      - name: Commit badge files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --cached --quiet || git commit -m "chore: update Lighthouse performance badges [skip ci]"
          git push
